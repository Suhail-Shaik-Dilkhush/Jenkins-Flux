apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels: nginx-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata: 
      name: nginx-pod
      labels: 
        app: nginx
    spec:
      containers:
        - name: nginx-pod
          image: nginx:latest
          imagePullPolicy: Always
          ports:
            - name: nginx-port
              containerPort: 80
          resources:
            requests:
              cpu : "50m"
              memory: "150Mi"
            limits:
              cpu: "150m"
              memory: "250Mi"


